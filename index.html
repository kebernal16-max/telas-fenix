<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telas Fénix - Catálogo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="cart-icon" onclick="irAlCarrito()">
        🛒 <span id="cart-count">0</span>
    </div>

    <section id="bienvenida">
        <div class="bienvenida-contenido">
            <p>Hola, te habla <strong>Andrea Villalba</strong></p>
            <h1>ESTA ES MI GRAN EMPRESA TEXTIL</h1>
            <button class="btn-rojo" onclick="mostrarCatalogo()">ENTRAR AL CATÁLOGO</button>
        </div>
    </section>

    <section id="catalogo" class="hidden">
        <h2 class="titulo-seccion">EJEMPLOS DE NUESTRAS PRENDAS</h2>
        <div class="contenedor-productos">
            <div class="producto-card" onclick="verDetalle('fenix')">
                <img src="fenix1.jpg" alt="Fénix Premium">
                <h3>Línea Fénix Premium</h3>
                <p>Desde $95.000</p>
                <button class="btn-ver">Ver Características</button>
            </div>
            <div class="producto-card" onclick="verDetalle('estandar')">
                <img src="estandar1.jpg" alt="Estándar">
                <h3>Línea Estándar</h3>
                <p>Desde $85.000</p>
                <button class="btn-ver">Ver Características</button>
            </div>
            <div class="producto-card" onclick="verDetalle('capuchon')">
                <img src="cap-mixto.jpg" alt="Capuchones">
                <h3>Capuchones Industriales</h3>
                <p>Desde $12.000</p>
                <button class="btn-ver">Ver Características</button>
            </div>
        </div>
    </section>

    <section id="detalle-tecnico" class="hidden">
        <button class="btn-volver" onclick="volverAlCatalogo()">← Volver</button>
        <div class="detalle-grid">
            <div class="detalle-galeria">
                <img id="imagen-principal" src="" alt="Producto">
                <div id="miniaturas-contenedor" class="miniaturas-flex"></div>
            </div>
            <div class="configurador">
                <h2 id="detalle-titulo"></h2>
                <div class="info-precios">
                    <p>Precio Unitario: <span id="precio-unitario"></span></p>
                    <p>Subtotal: <strong id="subtotal-valor">$0</strong></p>
                </div>
                <label>Talla o Material:</label>
                <select id="opcion-producto" onchange="actualizarCalculos()"></select>
                <label>Cantidad:</label>
                <input type="number" id="cantidad-input" value="1" min="1" oninput="actualizarCalculos()">
                <button class="btn-rojo" onclick="agregarAlCarrito()">AÑADIR AL PEDIDO 🛒</button>
            </div>
        </div>
    </section>

    <section id="carrito-seccion" class="hidden">
        <h2>RESUMEN DE TU PEDIDO</h2>
        <div id="lista-carrito"></div>
        <div class="totales-finales">
            <h3>TOTAL: <span id="total-precio">$0</span></h3>
        </div>
        <div class="formulario-cliente">
            <input type="text" id="nombre-cliente" placeholder="Tu Nombre Completo">
            <input type="text" id="ciudad-cliente" placeholder="Ciudad o Localidad">
            <button class="btn-whatsapp" onclick="enviarWhatsApp()">PEDIR POR WHATSAPP ✅</button>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
